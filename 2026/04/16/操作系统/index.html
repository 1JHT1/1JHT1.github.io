        <h4 id="1-进程线程协程">1.进程线程协程</h4>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line">进程—&gt;操作系统进行资源分配的基本单位，每个进程拥有独立的内存空间和系统资源</span><br><span class="line">线程-&gt;CPU调度的最小单位，是进程内的执行单元，共享进程的内存和资源，但拥有独立的栈和寄存器</span><br><span class="line">协程-&gt;用户态的轻量级线程，由程序控制切换，无需操作系统调度。</span><br><span class="line"></span><br><span class="line">############一些区别和特性：</span><br><span class="line">	进程间相互隔离，一个进程崩溃不会影响其他进程，进程切换开销大</span><br><span class="line">	线程间通信方便（直接读写共享内存），同一个进程内的某个线程崩溃可能导致整个进程崩溃，线程切换开销比进程小。</span><br><span class="line">	</span><br><span class="line">1.1-进程间的通信方式（IPC）？</span><br><span class="line">	管道-&gt;简单、单向、亲缘进程</span><br><span class="line">	消息队列-&gt;无亲缘、小块数据、可靠</span><br><span class="line">	共享内存-&gt;多个进程映射同一块物理内存，直接读写，最快的IPC方式（无数据拷贝）</span><br><span class="line">	信号量-&gt;大数据、高性能</span><br><span class="line">	信号-&gt;用于事件通知</span><br><span class="line">	套接字-&gt;可用于不同主机（网络）之间的进程通信Socket</span><br><span class="line">	</span><br><span class="line">1.2-线程间的通信方式?</span><br><span class="line">	共享内存、条件变量、信号量、互斥锁</span><br></pre></td></tr></table></figure>
<h4 id="2-内存管理">2.内存管理</h4>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="number">2.1</span>-内存管理的目标？</span><br><span class="line">	为每个进程提供独立的虚拟地址空间、防止进程之间相互干扰、允许进程安全地共享部分内存、让有限的物理内存可以运行超过其容量的程序（借助交换和请求分页）</span><br><span class="line">	</span><br><span class="line"><span class="number">2.2</span>-什么是虚拟内存，它和物理内存的关系？</span><br><span class="line">	（CPU产生的地址）虚拟内存是每个进程看到的、从 <span class="number">0</span> 开始的连续线性地址空间；物理内存是硬件实际的 DRAM 地址。两者通过 内存管理单元（MMU）和页表 进行映射。</span><br><span class="line"></span><br><span class="line"><span class="number">2.3</span>-什么是缺页中断？   </span><br></pre></td></tr></table></figure>
<h4 id="3-死锁">3.死锁</h4>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br></pre></td><td class="code"><pre><span class="line"><span class="number">3.1</span>-产生死锁的四个必要条件？</span><br><span class="line">	<span class="number">1.</span>互斥--资源一次只能被一个进程（或线程）占用</span><br><span class="line">	<span class="number">2.</span>持有并等待--进程至少持有一个资源，同时还在等待其他进程占用的资源</span><br><span class="line">	<span class="number">3.</span>不可剥夺--已分配的进程资源不能被强制剥夺，只能由持有者主动释放</span><br><span class="line">	<span class="number">4.</span>循环等待--进程间形成循环等待环</span><br><span class="line">	</span><br><span class="line"><span class="number">3.2</span>-预防死锁？</span><br><span class="line">	破坏互斥条件-&gt;将独占资源改成共享资源（但不是全部能改）</span><br><span class="line">	破坏持有并等待条件-&gt;进程开始执行前一次性申请所有需要的资源，要么全部获得，要么全部不分配（资源利用低，可能饥饿）</span><br><span class="line">	破坏不可剥夺条件-&gt;进程申请资源失败，释放已占用的资源（实现复杂）</span><br><span class="line">	破坏循环等待条件-&gt;有序资源分配，对资源类型编号，进程必须按编号递增顺序申请资源（常用，锁排序）</span><br><span class="line">	</span><br><span class="line"><span class="number">3.3</span>-避免死锁？</span><br><span class="line">	银行家算法：在分配给进程资源前，首先判断这个进程的安全性，也就是预执行，判断分配后是否产生死锁现象。如果系统当前资源能满足其执行，则尝试分配，如果不满足则让该进程等待。通过不断检查剩余可用资源是否满足某个进程的最大需求，如果可以则加入安全序列，并把该进程当前持有的资源回收；不断重复这个过程，看最后能否实现让所有进程都加入安全序列。</span><br><span class="line">	</span><br><span class="line">	【安全状态一定不会发生死锁，但不安全状态也不一定会发生死锁——不安全状态只是存在发生死锁的可能，并不必然死锁。】</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="number">3.4</span>-检测死锁和解除死锁？</span><br><span class="line">	检测死锁-&gt;资源分配图、等待图、银行家算法</span><br><span class="line">	解除死锁-&gt;终止进程、回滚到之前的某个安全状态、强行进行资源抢占，重新分配</span><br><span class="line"></span><br><span class="line"><span class="number">3.5</span>-IO多路复用select\poll\epoll</span><br><span class="line">    IO多路复用:允许【单个进程或线程】同时监听多个文件描述符（FD）,并在某个描述符可读、可写或出现异常时得到通知，避免无效等待，充分利用CPU资源。</span><br><span class="line">    监听和通知的方式-&gt;select\poll\epoll</span><br><span class="line">（<span class="number">1</span>）select模式</span><br><span class="line">        描述符集合用【位掩码】，每次调用需拷贝到内核，最大描述符数<span class="number">1024</span>\遍历性能O(n)</span><br><span class="line">（<span class="number">2</span>）poll模式</span><br><span class="line">		【使用pollfd数组】，无大小限制，最大描述符数受系统内存限制\遍历性能O(n)</span><br><span class="line">（<span class="number">3</span>）epoll模式</span><br><span class="line">        事件驱动，使用【回调机制】，只返回就绪的描述符，最大描述符数受系统内存限制\遍历性能O(<span class="number">1</span>)</span><br><span class="line">   </span><br><span class="line">#####高效的原因？</span><br><span class="line">        避免了多线程的上下文切换开销，特别适用于高并发网络服务（如 Web 服务器、聊天服务器）。资源节省：用一个线程处理成千上万个连接，内存占用低。</span><br><span class="line">        </span><br><span class="line">        </span><br><span class="line"><span class="number">3.6</span>-I/O模型有哪几类？</span><br><span class="line">        阻塞I/O、非阻塞I/O、I/O多路复用（监听时阻塞，I/O操作一般非阻塞）、异步I/O（完全不阻塞）。</span><br><span class="line">        </span><br><span class="line"><span class="number">3.7</span>-linux常用命令？</span><br><span class="line">        cd、pwd、ls、mkdir、rm、cp、mv、vim、find、kill PID</span><br><span class="line">        cat-&gt;查看文件全部内容</span><br><span class="line">        grep-&gt;文件或标准输入中的文本搜索命令</span><br><span class="line">        netstat -nap 查看网络状态可以看那些端口被哪些进程PID占用</span><br><span class="line">        top 动态查看CPU的使用情况</span><br><span class="line">        df -h 显示磁盘空间使用情况</span><br><span class="line"></span><br><span class="line">######CPU负责指令执行和数据处理，磁盘负责持久化存储数据。内存（RAM）是计算机系统中介于 CPU 和磁盘之间的关键缓冲层。</span><br><span class="line">        </span><br><span class="line"><span class="number">3.8</span>-进程调度算法？</span><br><span class="line">        ###批处理系统中的调度</span><br><span class="line">        -&gt;先来先服务(非抢占式的调度算法，【按照请求的顺序】进行调度。) </span><br><span class="line">        -&gt;最短作业优先(非抢占式的调度算法，按【估计运行时间最短的顺序】进行调度。 )</span><br><span class="line">        -&gt;最短剩余时间优先(最短作业优先的抢占式版本，按【剩余运行时间的顺序】进行调度。 )</span><br><span class="line">        ###交互式系统</span><br><span class="line">        时间片轮调度</span><br><span class="line">        优先级调度</span><br><span class="line">        多级队列</span><br><span class="line">        </span><br></pre></td></tr></table></figure>

<!-- ImageViewer -->

  <!-- Root element of PhotoSwipe. Must have class pswp. -->
<div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">

    <!-- Background of PhotoSwipe. 
         It's a separate element as animating opacity is faster than rgba(). -->
    <div class="pswp__bg"></div>

    <!-- Slides wrapper with overflow:hidden. -->
    <div class="pswp__scroll-wrap">

        <!-- Container that holds slides. 
            PhotoSwipe keeps only 3 of them in the DOM to save memory.
            Don't modify these 3 pswp__item elements, data is added later on. -->
        <div class="pswp__container">
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
        </div>

        <!-- Default (PhotoSwipeUI_Default) interface on top of sliding area. Can be changed. -->
        <div class="pswp__ui pswp__ui--hidden">

            <div class="pswp__top-bar">

                <!--  Controls are self-explanatory. Order can be changed. -->

                <div class="pswp__counter"></div>

                <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>

                <button class="pswp__button pswp__button--share" style="display:none" title="Share"></button>

                <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>

                <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>

                <!-- Preloader demo http://codepen.io/dimsemenov/pen/yyBWoR -->
                <!-- element will get class pswp__preloader--active when preloader is running -->
                <div class="pswp__preloader">
                    <div class="pswp__preloader__icn">
                        <div class="pswp__preloader__cut">
                            <div class="pswp__preloader__donut"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
                <div class="pswp__share-tooltip"></div>
            </div>

            <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)">
            </button>

            <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)">
            </button>

            <div class="pswp__caption">
                <div class="pswp__caption__center"></div>
            </div>

        </div>

    </div>

</div>

<link rel="stylesheet" href="https://cdn.staticfile.org/photoswipe/4.1.3/photoswipe.min.css">
<link rel="stylesheet" href="https://cdn.staticfile.org/photoswipe/4.1.3/default-skin/default-skin.min.css">
<script src="https://cdn.staticfile.org/photoswipe/4.1.3/photoswipe.min.js"></script>
<script src="https://cdn.staticfile.org/photoswipe/4.1.3/photoswipe-ui-default.min.js"></script>

<script>
    function viewer_init() {
        let pswpElement = document.querySelectorAll('.pswp')[0];
        let $imgArr = document.querySelectorAll(('.article-entry img:not(.reward-img)'))

        $imgArr.forEach(($em, i) => {
            $em.onclick = () => {
                // slider展开状态
                // todo: 这样不好，后面改成状态
                if (document.querySelector('.left-col.show')) return
                let items = []
                $imgArr.forEach(($em2, i2) => {
                    let img = $em2.getAttribute('data-idx', i2)
                    let src = $em2.getAttribute('data-target') || $em2.getAttribute('src')
                    let title = $em2.getAttribute('alt')
                    // 获得原图尺寸
                    const image = new Image()
                    image.src = src
                    items.push({
                        src: src,
                        w: image.width || $em2.width,
                        h: image.height || $em2.height,
                        title: title
                    })
                })
                var gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, {
                    index: parseInt(i)
                });
                gallery.init()
            }
        })
    }
    viewer_init()
</script>

<!-- CodeCopy -->

  
<link rel="stylesheet" href="/css/clipboard.css">

  <script src="https://cdn.staticfile.org/clipboard.js/2.0.10/clipboard.min.js"></script>
<script>
  function wait(callback, seconds) {
    var timelag = null;
    timelag = window.setTimeout(callback, seconds);
  }
  !function (e, t, a) {
    var initCopyCode = function(){
      var copyHtml = '';
      copyHtml += '<button class="btn-copy" data-clipboard-snippet="">';
      copyHtml += '<i class="ri-file-copy-2-line"></i><span>COPY</span>';
      copyHtml += '</button>';
      $(".highlight .code pre").before(copyHtml);
      $(".article pre code").before(copyHtml);
      var clipboard = new ClipboardJS('.btn-copy', {
        target: function(trigger) {
          return trigger.nextElementSibling;
        }
      });
      clipboard.on('success', function(e) {
        let $btn = $(e.trigger);
        $btn.addClass('copied');
        let $icon = $($btn.find('i'));
        $icon.removeClass('ri-file-copy-2-line');
        $icon.addClass('ri-checkbox-circle-line');
        let $span = $($btn.find('span'));
        $span[0].innerText = 'COPIED';
        
        wait(function () { // 等待两秒钟后恢复
          $icon.removeClass('ri-checkbox-circle-line');
          $icon.addClass('ri-file-copy-2-line');
          $span[0].innerText = 'COPY';
        }, 2000);
      });
      clipboard.on('error', function(e) {
        e.clearSelection();
        let $btn = $(e.trigger);
        $btn.addClass('copy-failed');
        let $icon = $($btn.find('i'));
        $icon.removeClass('ri-file-copy-2-line');
        $icon.addClass('ri-time-line');
        let $span = $($btn.find('span'));
        $span[0].innerText = 'COPY FAILED';
        
        wait(function () { // 等待两秒钟后恢复
          $icon.removeClass('ri-time-line');
          $icon.addClass('ri-file-copy-2-line');
          $span[0].innerText = 'COPY';
        }, 2000);
      });
    }
    initCopyCode();
  }(window, document);
</script>
